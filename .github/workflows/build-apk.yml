name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.3.1"

      - name: Find Android project
        shell: bash
        run: |
          SETTINGS_PATH="$(find "$GITHUB_WORKSPACE" -type f -name "settings.gradle.kts" | head -n 1)"

          if [ -z "$SETTINGS_PATH" ]; then
            echo "::error::settings.gradle.kts پیدا نشد."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort | head -n 200
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_PATH")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_DIR"

      - name: Prepare example environment file
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ ! -f ".env.example" ]; then
            cat > .env.example <<'EOF'
          # Example environment variables
          # Do not place real secrets in this file.
          EOF
          fi

          echo ".env.example is ready."

      - name: Verify project files
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          test -f settings.gradle.kts || {
            echo "::error::settings.gradle.kts پیدا نشد."
            exit 1
          }

          test -f build.gradle.kts || {
            echo "::error::build.gradle.kts پیدا نشد."
            exit 1
          }

          test -d app || {
            echo "::error::پوشه app پیدا نشد."
            exit 1
          }

          echo "Project structure is valid."
          java -version
          gradle --version

      - name: Build Debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Verify generated APK
        shell: bash
        run: |
          APK_FILES="$(find "$GITHUB_WORKSPACE" -type f -path "*/app/build/outputs/apk/debug/*.apk")"

          if [ -z "$APK_FILES" ]; then
            echo "::error::فایل APK ساخته نشد."
            exit 1
          fi

          echo "Generated APK:"
          echo "$APK_FILES"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: IELTS-Leitner-debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
