name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify required files
        shell: bash
        run: |
          test -f settings.gradle.kts || {
            echo "::error::settings.gradle.kts not found"
            exit 1
          }

          test -f build.gradle.kts || {
            echo "::error::build.gradle.kts not found"
            exit 1
          }

          test -f .env.example || {
            echo "::error::.env.example not found"
            exit 1
          }

          test -f gradlew || {
            echo "::error::gradlew not found"
            exit 1
          }

          test -d app || {
            echo "::error::app module not found"
            exit 1
          }

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Verify APK
        shell: bash
        run: |
          find app/build/outputs/apk -type f -name "*.apk" -print

          test -n "$(find app/build/outputs/apk/debug -type f -name '*.apk' 2>/dev/null)" || {
            echo "::error::Debug APK not found"
            exit 1
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IELTS-Leitner-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
