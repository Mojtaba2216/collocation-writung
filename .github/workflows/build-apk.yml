name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.3.1"
          validate-wrappers: false

      - name: Find Android project
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS_PATH="$(find "$GITHUB_WORKSPACE" \
            -type f \
            -name "settings.gradle.kts" \
            -not -path "*/.gradle/*" \
            -not -path "*/build/*" \
            | head -n 1)"

          if [ -z "$SETTINGS_PATH" ]; then
            echo "::error::فایل settings.gradle.kts پیدا نشد."
            find "$GITHUB_WORKSPACE" -maxdepth 5 -type f | sort | head -n 300
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_PATH")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at:"
          echo "$PROJECT_DIR"

      - name: Prepare environment file
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f ".env.example" ]; then
            printf '%s\n' \
              '# Example environment variables' \
              '# Do not place real secrets in this file.' \
              > .env.example
          fi

          test -f ".env.example"
          echo ".env.example is ready."

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          test -f "settings.gradle.kts" || {
            echo "::error::settings.gradle.kts پیدا نشد."
            exit 1
          }

          test -f "build.gradle.kts" || {
            echo "::error::build.gradle.kts پیدا نشد."
            exit 1
          }

          test -d "app" || {
            echo "::error::پوشه app پیدا نشد."
            exit 1
          }

          test -f "app/build.gradle.kts" || {
            echo "::error::فایل app/build.gradle.kts پیدا نشد."
            exit 1
          }

          echo "Project structure is valid."

      - name: Show Java and Gradle versions
        shell: bash
        run: |
          set -euo pipefail

          java -version
          gradle --version

      - name: Create debug keystore
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f "debug.keystore" ]; then
            keytool -genkeypair \
              -keystore "debug.keystore" \
              -storepass "android" \
              -alias "androiddebugkey" \
              -keypass "android" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -noprompt
          fi

          test -f "debug.keystore" || {
            echo "::error::فایل debug.keystore ساخته نشد."
            exit 1
          }

          echo "Debug keystore is ready."

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          gradle :app:assembleDebug \
            --stacktrace \
            --no-daemon

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug" \
            -type f \
            -name "*.apk" \
            | head -n 1)"

          if [ -z "$APK_FILE" ]; then
            echo "::error::فایل APK ساخته‌شده پیدا نشد."
            find "$PROJECT_DIR/app/build" -type f | sort | tail -n 200 || true
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp "$APK_FILE" "$GITHUB_WORKSPACE/artifacts/app-debug.apk"

          echo "Generated APK:"
          ls -lh "$GITHUB_WORKSPACE/artifacts/app-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: IELTS-Leitner-debug-apk
          path: artifacts/app-debug.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
